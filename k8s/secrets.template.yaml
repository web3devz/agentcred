apiVersion: v1
kind: Secret
metadata:
  name: agentcred-secrets
type: Opaque
stringData:
  ALLOWED_CLIENT_CERT_SHA256: "REPLACE_CLIENT_CERT_SHA256"
  REQUIRED_ATTESTATION: "REPLACE_ATTESTATION_TOKEN"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentcred-tls
type: Opaque
stringData:
  ca.crt: |
    REPLACE_CA_CRT
  server.crt: |
    REPLACE_SERVER_CRT
  server.key: |
    REPLACE_SERVER_KEY
